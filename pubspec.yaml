name: anonka
description: "A new Flutter project."
publish_to: "none"
version: 1.3.0+7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^8.2.0
  injectable: ^2.5.2
  flutter_bloc: ^9.1.1
  package_info_plus: ^9.0.0
  firebase_core: ^4.1.1
  firebase_remote_config: ^6.0.2
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.3
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  firebase_storage: ^13.1.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.5.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/svg_icons/
  fonts:
    - family: icomoon
      fonts:
        - asset: assets/fonts/icomoon.ttf

flutter_native_splash:
  color: "#000000"
  image: assets/images/anonka-icon.png
  android: true
  ios: true
  web: false

  android_12:
    color: "#000000"
    image: assets/images/anonka-icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/anonka-icon.png"
